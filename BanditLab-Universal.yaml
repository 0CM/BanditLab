write_files:
  - path: /etc/profile.d/banditlab-path.sh
    owner: root:root
    permissions: '0644'
    content: |
      # BanditLab tool PATH — interactive and non-interactive shells
      export PATH="/home/ubuntu/bin:/home/ubuntu/pyapps/bin:/home/ubuntu/plaso/bin:${PATH}"

  - path: /etc/profile.d/banditlab-aliases.sh
    owner: root:root
    permissions: '0644'
    content: |
      # Convenience aliases — invocation uses symlinks/PATH; 'tools' lists the catalog
      alias tools='banditlab-tools'
      alias pyapps='source /home/ubuntu/pyapps/bin/activate'

  - path: /etc/systemd/system/banditlab-postdeploy.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=BanditLab forensic tool deployment
      After=network-online.target cloud-init.target
      Wants=network-online.target
      ConditionPathExists=!/home/ubuntu/.lab/.postdeploy.done

      [Service]
      Type=oneshot
      User=ubuntu
      Group=ubuntu
      Environment=HOME=/home/ubuntu
      ExecStart=/home/ubuntu/.lab/run-postdeploy.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

  - path: /home/ubuntu/.lab/start-postdeploy-after-cloudinit.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Waits for cloud-init (including deferred write_files) then starts post-deploy.
      LOG=/var/log/banditlab-trigger.log
      echo "[trigger] $(date -Is) waiting for cloud-init to finish" >> "$LOG"
      cloud-init status --wait >> "$LOG" 2>&1 || true

      for i in $(seq 1 60); do
        if [ -x /home/ubuntu/.lab/fortoolsinit.sh ] && [ -f /home/ubuntu/.lab/plasoinit.in ]; then
          echo "[trigger] $(date -Is) deploy scripts ready" >> "$LOG"
          break
        fi
        echo "[trigger] $(date -Is) waiting for deploy scripts ($i/60)" >> "$LOG"
        sleep 2
      done

      echo "[trigger] $(date -Is) starting banditlab-postdeploy.service" >> "$LOG"
      systemctl start banditlab-postdeploy.service >> "$LOG" 2>&1

  - path: /etc/cron.d/banditlab-postdeploy
    owner: root:root
    permissions: '0644'
    content: |
      # Fallback if cloud-init trigger missed first boot
      @reboot root sleep 180 && [ ! -f /home/ubuntu/.lab/.postdeploy.done ] && /usr/bin/systemctl start banditlab-postdeploy.service

  - path: /home/ubuntu/.lab/run-postdeploy.sh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      SENTINEL="/home/ubuntu/.lab/.postdeploy.done"
      LOG="/home/ubuntu/.lab/postdeploy.log"
      LOCK="/home/ubuntu/.lab/.postdeploy.lock"

      [ -f "$SENTINEL" ] && exit 0

      mkdir -p /home/ubuntu/.lab
      exec 9>"$LOCK"
      if ! flock -n 9; then
        echo "[postdeploy] Another instance is running." | tee -a "$LOG"
        exit 0
      fi

      for i in $(seq 1 30); do
        if [ -x /home/ubuntu/.lab/fortoolsinit.sh ] && [ -f /home/ubuntu/.lab/plasoinit.in ]; then
          break
        fi
        echo "[postdeploy] Waiting for deploy scripts ($i/30)..." | tee -a "$LOG"
        sleep 2
      done

      if [ ! -x /home/ubuntu/.lab/fortoolsinit.sh ]; then
        echo "[postdeploy] ERROR: fortoolsinit.sh not found. Cloud-init may be incomplete." | tee -a "$LOG"
        exit 1
      fi

      echo "[postdeploy] Starting at $(date -Is)" | tee -a "$LOG"

      if bash /home/ubuntu/.lab/fortoolsinit.sh 2>&1 | tee -a "$LOG" \
        && /home/ubuntu/plaso/bin/python3 -m pip install -r /home/ubuntu/.lab/plasoinit.in 2>&1 | tee -a "$LOG"; then
        bash /home/ubuntu/.lab/generate-tools-manifest.sh
        touch "$SENTINEL"
        echo "[postdeploy] Finished OK at $(date -Is)" | tee -a "$LOG"
        exit 0
      fi

      echo "[postdeploy] Failed at $(date -Is). Will retry on next boot or login." | tee -a "$LOG"
      exit 1
    defer: true

  - path: /home/ubuntu/.lab/generate-tools-manifest.sh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      HOME="${HOME:-/home/ubuntu}"
      MANIFEST="${HOME}/.lab/tools.manifest"
      TMP="$(mktemp)"

      add() {
        printf '%s|%s|%s\n' "$1" "$2" "$3" >> "$TMP"
      }

      for name in mftecmd amcacheparser bstrings evtxecmd jlecmd lecmd rbcmd recmd \
        srumecmd recentfilecacheparser sqlecmd wxtcmd rla; do
        add eztools "$name" "Eric Zimmerman EZTool"
      done

      for name in hayabusa nuclei chainsaw trufflehog noseyparker vt pup sidr timeliner; do
        add binary "$name" "Standalone forensic binary"
      done

      for name in edrparser hindsight hindsight_gui pdfid olevba peepdf fat_parser \
        ntfs_parser browserexport parse_smsdb prefetcher xlsxgrep auto-archiver ioc-scan odl; do
        add python "$name" "Python tool (pyapps venv)"
      done

      for name in log2timeline pinfo psteal psort; do
        add plaso "$name" "Plaso forensic suite"
      done

      for name in sleuthkit tshark yara exiftool testdisk dc3dd dnsrecon nikto; do
        add apt "$name" "System package (apt)"
      done

      add optional install-pwsh "Install PowerShell on demand"
      add optional install-azurecli "Install Azure CLI on demand"
      add optional install-gcloud "Install Google Cloud CLI via snap on demand"

      sort -t'|' -k1,1 -k2,2 "$TMP" > "$MANIFEST"
      rm -f "$TMP"
      echo "[manifest] Wrote $(wc -l < "$MANIFEST") tools to ${MANIFEST}"
    defer: true

  - path: /home/ubuntu/bin/banditlab-tools
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      HOME="${HOME:-/home/ubuntu}"
      MANIFEST="${HOME}/.lab/tools.manifest"

      usage() {
        cat <<'EOF'
      Usage: banditlab-tools [category]

      List installed BanditLab forensic tools by category.
        banditlab-tools           Show categories and counts
        banditlab-tools eztools   List Eric Zimmerman EZTools
        banditlab-tools python    List pyapps Python tools
        banditlab-tools plaso     List Plaso tools
        banditlab-tools binary    List standalone binaries
        banditlab-tools apt       List key apt packages
        banditlab-tools optional  List on-demand installers

      Shortcut: alias tools='banditlab-tools'
      EOF
      }

      case "${1:-}" in
        -h|--help) usage; exit 0 ;;
      esac

      if [ ! -f "$MANIFEST" ]; then
        if [ -f "${HOME}/.lab/.postdeploy.done" ]; then
          echo "Manifest missing. Regenerating..."
          bash "${HOME}/.lab/generate-tools-manifest.sh"
        else
          echo "BanditLab deploy in progress or not started."
          echo "  tail -f ~/.lab/postdeploy.log"
          echo "  sudo tail -f /var/log/banditlab-trigger.log"
          exit 1
        fi
      fi

      if [ -n "${1:-}" ]; then
        printf "%-22s %s\n" "NAME" "DESCRIPTION"
        printf "%-22s %s\n" "----" "-----------"
        awk -F'|' -v cat="${1}" '$1 == cat { printf "%-22s %s\n", $2, $3 }' "$MANIFEST"
        exit 0
      fi

      echo "BanditLab tool catalog"
      echo "Run: banditlab-tools <category>"
      echo ""
      awk -F'|' '
        { cats[$1]++ }
        END {
          for (c in cats) printf "  %-12s (%d tools)\n", c, cats[c]
        }' "$MANIFEST" | sort
      echo ""
      echo "Examples: banditlab-tools eztools | banditlab-tools python"
    defer: true

  - path: /etc/update-motd.d/99-banditlab
    owner: root:root
    permissions: '0755'
    content: |
      #!/bin/sh
      SENTINEL="/home/ubuntu/.lab/.postdeploy.done"
      MANIFEST="/home/ubuntu/.lab/tools.manifest"
      LOG="/home/ubuntu/.lab/postdeploy.log"

      if [ -f "$SENTINEL" ] && [ -f "$MANIFEST" ]; then
        COUNT="$(wc -l < "$MANIFEST" | tr -d ' ')"
        printf "\n  BanditLab: ready (%s tools) — run: banditlab-tools\n\n" "$COUNT"
      elif pgrep -f "run-postdeploy.sh|fortoolsinit.sh" >/dev/null 2>&1; then
        printf "\n  BanditLab: deploying tools...  tail -f ~/.lab/postdeploy.log\n\n"
      elif [ -f "$LOG" ]; then
        printf "\n  BanditLab: deploy incomplete — tail -f ~/.lab/postdeploy.log\n\n"
      else
        printf "\n  BanditLab: starting deploy shortly...\n\n"
      fi

  - path: /etc/profile.d/99-postdeploy.sh
    owner: root:root
    permissions: '0644'
    content: |
      # Fallback: retry post-deploy on interactive login if auto-trigger failed
      case $- in *i* ) ;; * ) return ;; esac
      [ "$USER" = "ubuntu" ] || return
      [ -f /home/ubuntu/.lab/.postdeploy.done ] && return
      nohup /home/ubuntu/.lab/run-postdeploy.sh >> /home/ubuntu/.lab/postdeploy.log 2>&1 &
    defer: true

