  - path: /home/ubuntu/bin/install-pwsh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      ARCH="$(uname -m)"
      case "${ARCH}" in
        aarch64)
          PWSH_URL="https://github.com/PowerShell/PowerShell/releases/download/v7.5.0/powershell-7.5.0-linux-arm64.tar.gz"
          ;;
        x86_64)
          PWSH_URL="https://github.com/PowerShell/PowerShell/releases/download/v7.5.4/powershell-7.5.4-linux-musl-x64.tar.gz"
          ;;
        *)
          echo "install-pwsh: unsupported architecture: ${ARCH}" >&2
          exit 1
          ;;
      esac
      wget --no-check-certificate -qO- "${PWSH_URL}" \
        | tar -xz -C "${HOME}/tools/" --one-top-level=powershell
      chmod 755 "${HOME}/tools/powershell/pwsh"
      sudo ln -sf "${HOME}/tools/powershell/pwsh" /usr/local/bin/pwsh
      echo "PowerShell installed: $(pwsh --version)"
    defer: true

  - path: /home/ubuntu/bin/install-azurecli
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
    defer: true

  - path: /home/ubuntu/bin/install-gcloud
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      sudo snap install google-cloud-cli --classic
    defer: true

  - path: /home/ubuntu/.lab/fortoolsinit.sh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      [ -z "${BASH_VERSION:-}" ] && exec /usr/bin/env bash "$0" "$@"
      set -uo pipefail
      export DEBIAN_FRONTEND=noninteractive
      
      echo '#######################################'
      echo '# BanditLab tool deployment script    #'
      echo '#######################################'
      
      HOME="${HOME:-/home/ubuntu}"
      PYAPPS="${HOME}/pyapps/bin/python3"
      TOOLS="${HOME}/tools"
      BIN="${HOME}/bin"
      FAIL_LOG="${HOME}/.lab/fortoolsinit.failures"
      
      OK=()
      FAILED=()
      
      step() {
        local name="$1"
        shift
        echo "[fortoolsinit] >>> ${name}"
        if "$@"; then
          echo "[fortoolsinit] OK: ${name}"
          OK+=("${name}")
          return 0
        fi
        echo "[fortoolsinit] FAIL: ${name}" >&2
        FAILED+=("${name}")
        echo "$(date -Is) FAIL: ${name}" >> "${FAIL_LOG}"
        return 1
      }
      
      fetch_tar() {
        local url="$1" dest="$2"
        local tmp
        tmp="$(mktemp)"
        wget --no-check-certificate -qO "${tmp}" "${url}" && [ -s "${tmp}" ] \
          && { tar -xzf "${tmp}" -C "${dest}" 2>/dev/null || tar -xf "${tmp}" -C "${dest}"; } \
          && rm -f "${tmp}"
      }
      
      fetch_archive() {
        local url="$1" dest="$2"
        local tmp
        tmp="$(mktemp)"
        wget --no-check-certificate -qO "${tmp}" "${url}" && [ -s "${tmp}" ] \
          && bsdtar -xf "${tmp}" -C "${dest}" \
          && rm -f "${tmp}"
      }
      
      link_user() {
        [ -e "$1" ] || return 1
        ln -sf "$1" "${BIN}/$(basename "$2")"
      }
      
      link_system() {
        [ -e "$1" ] || return 1
        sudo ln -sf "$1" "/usr/local/bin/$(basename "$2")"
      }
      
      mkdir -p "${BIN}" "${HOME}"/{DATA,ewfmount,evidence,.lab}
      mkdir -p "${TOOLS}"/{hayabusa,memprocfs,trufflehog,noseyparker,pup,vt,nuclei}
      : > "${FAIL_LOG}"
      
      step "apt-update" sudo apt-get update -qq
      
      step "apt-forensic-packages" sudo apt-get install -y \
        afflib-tools attr cewl dc3dd dislocker dnsrecon ewf-tools exifprobe \
        fcrackzip forensic-artifacts forensics-colorize galleta hashdeep pff-tools \
        mc recoverdm scrounge-ntfs sleuthkit ssdeep wipe yara ext3grep \
        libimage-exiftool-perl testdisk geoip-bin mblaze mboxgrep pev unar \
        tesseract-ocr libvshadow-utils python3.12 python3.12-venv python3-pip \
        extundelete libarchive-tools ugrep apt-transport-https parallel nikto jq \
        xmlstarlet poppler-utils xq libplist-utils qpdf tshark wireshark-common \
        unzip git
      
      step "pip-pyapps-core" "${PYAPPS}" -m pip install wheel construct pdfid oletools pyhindsight \
        auto-archiver xlsxgrep tabulate dnspython domaintools_api evtxtract \
        parse_smsdb pycryptodome chardet
      
      step "pip-dfir-ntfs" "${PYAPPS}" -m pip install \
        https://github.com/msuhanov/dfir_ntfs/archive/refs/tags/1.1.20.tar.gz
      
      step "pip-ioc-scanner" "${PYAPPS}" -m pip install git+https://github.com/cisagov/ioc-scanner.git
      
      step "pip-ccl-chromium" "${PYAPPS}" -m pip install git+https://github.com/cclgroupltd/ccl_chromium_reader.git
      
      step "pip-edrparser" "${PYAPPS}" -m pip install \
        https://github.com/0CM/BanditLab/raw/refs/heads/main/packages/edrparser-2.2.0.tar.gz
      
      step "prefetcher-download" bash -c "
        wget --no-check-certificate -q \
          https://raw.githubusercontent.com/ajread4/prefetcher/refs/heads/main/prefetcher.py \
          -O '${HOME}/pyapps/bin/prefetcher.py' \
        && chmod 755 '${HOME}/pyapps/bin/prefetcher.py' \
        && chmod 755 '${HOME}/pyapps/bin/hindsight.py' '${HOME}/pyapps/bin/hindsight_gui.py' 2>/dev/null || true
      "
      
      ARCH="$(uname -m)"
      HAYABUSA_VERSION="3.7.0"
      HAYABUSA_BIN=""
      
      if [ "${ARCH}" = "aarch64" ]; then
        echo "[fortoolsinit] Architecture: aarch64"
      
        step "binary-eztools" fetch_tar \
          "https://github.com/0CM/BanditLab/raw/main/packages/EZTools_aarch64-20240710.tar.gz" "${TOOLS}/"
        step "binary-sidr" fetch_tar \
          "https://github.com/0CM/BanditLab/raw/main/packages/sidr_aarch64-20240702.tar.gz" "${TOOLS}/"
        step "binary-memprocfs" fetch_tar \
          "https://github.com/ufrisk/MemProcFS/releases/download/v5.17/MemProcFS_files_and_binaries_v5.17.9-linux_aarch64-20260709.tar.gz" \
          "${TOOLS}/memprocfs"
        step "binary-hayabusa" fetch_archive \
          "https://github.com/Yamato-Security/hayabusa/releases/download/v3.10.0/hayabusa-3.10.0-lin-aarch64-gnu.zip" \
          "${TOOLS}/hayabusa"
        HAYABUSA_BIN="${TOOLS}/hayabusa/hayabusa-${HAYABUSA_VERSION}-lin-aarch64-gnu"
        step "binary-trufflehog" fetch_tar \
          "https://github.com/trufflesecurity/trufflehog/releases/download/v3.95.9/trufflehog_3.95.9_linux_arm64.tar.gz" \
          "${TOOLS}/trufflehog"
        step "binary-noseyparker" fetch_tar \
          "https://github.com/praetorian-inc/noseyparker/releases/download/v0.24.0/noseyparker-v0.24.0-aarch64-unknown-linux-gnu.tar.gz" \
          "${TOOLS}/noseyparker"
        step "binary-chainsaw" fetch_tar \
          "https://github.com/WithSecureLabs/chainsaw/releases/download/v2.16.2/chainsaw_aarch64-unknown-linux-gnu.tar.gz" \
          "${TOOLS}/"
        step "binary-timeliner" fetch_tar \
          "https://github.com/0CM/BanditLab/raw/main/packages/timeliner_aarch64-20240805.tar.gz" "${TOOLS}/"
        step "binary-pup" fetch_archive \
          "https://github.com/ericchiang/pup/releases/download/v0.4.0/pup_v0.4.0_linux_arm64.zip" "${TOOLS}/pup"
        step "binary-vt" fetch_tar \
          "https://github.com/0CM/BanditLab/raw/main/packages/vt-cli_aarch64-20240720.tar.gz" "${TOOLS}/vt"
        step "binary-nuclei" fetch_archive \
          "https://github.com/projectdiscovery/nuclei/releases/download/v3.11.0/nuclei_3.11.0_linux_arm64.zip" "${TOOLS}/nuclei"
      
      elif [ "${ARCH}" = "x86_64" ]; then
        echo "[fortoolsinit] Architecture: x86_64"
      
        step "binary-eztools" fetch_tar \
          "https://github.com/0CM/BanditLab/raw/main/packages/EZTools_x86_64-20240725.tar.gz" "${TOOLS}/"
        step "binary-sidr" fetch_tar \
          "https://github.com/0CM/BanditLab/raw/main/packages/sidr_x86_64-20240725.tar.gz" "${TOOLS}/"
        step "binary-memprocfs" fetch_tar \
          "https://github.com/ufrisk/MemProcFS/releases/download/v5.17/MemProcFS_files_and_binaries_v5.17.9-linux_x64-20260709.tar.gz" \
          "${TOOLS}/memprocfs"
        step "binary-hayabusa" fetch_archive \
          "https://github.com/Yamato-Security/hayabusa/releases/download/v3.10.0/hayabusa-3.10.0-lin-x64-musl.zip" \
          "${TOOLS}/hayabusa"
        HAYABUSA_BIN="${TOOLS}/hayabusa/hayabusa-${HAYABUSA_VERSION}-lin-x64-musl"
        step "binary-trufflehog" fetch_tar \
          "https://github.com/trufflesecurity/trufflehog/releases/download/v3.95.9/trufflehog_3.95.9_linux_amd64.tar.gz" \
          "${TOOLS}/trufflehog"
        step "binary-noseyparker" fetch_tar \
          "https://github.com/praetorian-inc/noseyparker/releases/download/v0.24.0/noseyparker-v0.24.0-x86_64-unknown-linux-gnu.tar.gz" \
          "${TOOLS}/noseyparker"
        step "binary-chainsaw" fetch_tar \
          "https://github.com/WithSecureLabs/chainsaw/releases/download/v2.16.2/chainsaw_x86_64-unknown-linux-gnu.tar.gz" \
          "${TOOLS}/"
        step "binary-timeliner" fetch_tar \
          "https://github.com/0CM/BanditLab/raw/main/packages/timeliner_x86_64-20240805.tar.gz" "${TOOLS}/"
        step "binary-pup" fetch_archive \
          "https://github.com/ericchiang/pup/releases/download/v0.4.0/pup_v0.4.0_linux_amd64.zip" "${TOOLS}/pup"
        step "binary-vt" fetch_archive \
          "https://github.com/VirusTotal/vt-cli/releases/download/1.3.1/Linux64.zip" "${TOOLS}/vt"
        step "binary-nuclei" fetch_archive \
          "https://github.com/projectdiscovery/nuclei/releases/download/v3.11.0/nuclei_3.11.0_linux_amd64.zip" "${TOOLS}/nuclei"
        step "odl-download" bash -c "
          wget --no-check-certificate -q \
            https://raw.githubusercontent.com/ydkhatri/OneDrive/refs/heads/main/odl.py \
            -O '${HOME}/pyapps/bin/odl.py' && chmod 755 '${HOME}/pyapps/bin/odl.py'
        "
      
      else
        echo "[fortoolsinit] ERROR: unsupported architecture: ${ARCH}" >&2
        exit 1
      fi
      
      step "hayabusa-symlink" bash -c "
        [ -x '${HAYABUSA_BIN}' ] && chmod 755 '${HAYABUSA_BIN}' \
          && ln -sf '${HAYABUSA_BIN}' '${TOOLS}/hayabusa/hayabusa'
      "
      
      step "link-pup" bash -c "[ -f '${TOOLS}/pup/pup' ] && chmod 755 '${TOOLS}/pup/pup'"
      step "link-vt" bash -c "[ -f '${TOOLS}/vt/vt' ] && chmod 755 '${TOOLS}/vt/vt'"
      step "link-nuclei" bash -c "[ -f '${TOOLS}/nuclei/nuclei' ] && chmod 755 '${TOOLS}/nuclei/nuclei'"
      
      step "symlink-pup" link_system "${TOOLS}/pup/pup" pup
      step "symlink-vt" link_system "${TOOLS}/vt/vt" vt
      step "symlink-nuclei" link_system "${TOOLS}/nuclei/nuclei" nuclei
      step "symlink-hayabusa" link_system "${TOOLS}/hayabusa/hayabusa" hayabusa
      step "symlink-trufflehog" link_system "${TOOLS}/trufflehog/trufflehog" trufflehog
      step "symlink-noseyparker" link_system "${TOOLS}/noseyparker/bin/noseyparker" noseyparker
      step "symlink-chainsaw" link_system "${TOOLS}/chainsaw/chainsaw" chainsaw
      step "symlink-timeliner" link_system "${TOOLS}/timeliner/timeliner" timeliner
      step "symlink-sidr" link_system "${TOOLS}/sidr/sidr" sidr
      
      step "nuclei-update" bash -c "command -v nuclei >/dev/null && nuclei -update"
      
      step "recmd-batch-kroll" bash -c "
        mkdir -p '${TOOLS}/EZTools/RECmd/BatchExamples' \
        && wget --no-check-certificate -q \
          https://raw.githubusercontent.com/EricZimmerman/RECmd/refs/heads/master/BatchExamples/Kroll_Batch.reb \
          -O '${TOOLS}/EZTools/RECmd/BatchExamples/Kroll_Batch.reb'
      "
      
      step "recmd-batch-useractivity" bash -c "
        wget --no-check-certificate -q \
          https://raw.githubusercontent.com/EricZimmerman/RECmd/refs/heads/master/BatchExamples/UserActivity.reb \
          -O '${TOOLS}/EZTools/RECmd/BatchExamples/UserActivity.reb'
      "
      
      echo "[fortoolsinit] Linking EZTools into ~/bin..."
      for tool in \
        "MFTECmd:mftecmd" "AmcacheParser:amcacheparser" "bstrings:bstrings" \
        "EvtxECmd:evtxecmd" "JLECmd:jlecmd" "LECmd:lecmd" "RBCmd:rbcmd" \
        "RECmd:recmd" "SrumECmd:srumecmd" "RecentFileCacheParser:recentfilecacheparser" \
        "SQLECmd:sqlecmd" "WxTCmd:wxtcmd" "rla:rla"; do
        src_name="${tool%%:*}"
        link_name="${tool##*:}"
        step "eztool-${link_name}" link_user "${TOOLS}/EZTools/${src_name}/${src_name}" "${link_name}"
      done
      
      step "git-sigma" bash -c "
        rm -rf '${TOOLS}/chainsaw/sigma' \
        && git clone --depth 1 https://github.com/SigmaHQ/sigma '${TOOLS}/chainsaw/sigma'
      "
      
      step "git-chainsaw-rules" bash -c "
        tmpdir=\$(mktemp -d) \
        && git clone --depth 1 https://github.com/WithSecureLabs/chainsaw.git \"\${tmpdir}/chainsaw\" \
        && mv \"\${tmpdir}/chainsaw/mappings\" \"\${tmpdir}/chainsaw/rules\" '${TOOLS}/chainsaw/' \
        && rm -rf \"\${tmpdir}\"
      "
      
      step "git-lynis" git clone --depth 1 https://github.com/CISOfy/lynis "${TOOLS}/lynis"
      
      step "hayabusa-update-rules" bash -c "
        [ -x '${TOOLS}/hayabusa/hayabusa' ] && '${TOOLS}/hayabusa/hayabusa' update-rules
      "
      
      echo ""
      echo "[fortoolsinit] ========== DEPLOYMENT SUMMARY =========="
      echo "[fortoolsinit] Succeeded: ${#OK[@]} steps"
      echo "[fortoolsinit] Failed:    ${#FAILED[@]} steps"
      
      if [ "${#FAILED[@]}" -gt 0 ]; then
        echo "[fortoolsinit] Failed steps:"
        printf '  - %s\n' "${FAILED[@]}"
        echo "[fortoolsinit] Details: ${FAIL_LOG}"
      fi
      
      echo "[fortoolsinit] Deployment finished (partial success allowed)."
      echo "[fortoolsinit] Run 'banditlab-tools' to list installed tools."
      
      # Exit 0 so plaso pip install still runs in run-postdeploy.sh
      exit 0
    defer: true

runcmd:
  - update-ca-certificates
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y libplist-utils python3.12 python3.12-venv python3-pip ca-certificates curl wget libarchive-tools unzip git cron
  - snap install multipass-sshfs || true
  - install -d -o ubuntu -g ubuntu /home/ubuntu/bin /home/ubuntu/.lab
  - chown -R ubuntu:ubuntu /home/ubuntu
  - sudo -u ubuntu python3.12 -m venv /home/ubuntu/pyapps
  - sudo -u ubuntu python3.12 -m venv /home/ubuntu/plaso
  - sudo -u ubuntu /home/ubuntu/pyapps/bin/python3 -m pip install --upgrade pip
  - sudo -u ubuntu /home/ubuntu/plaso/bin/python3 -m pip install --upgrade pip
  - DEBIAN_FRONTEND=noninteractive apt-get install -y dotnet-runtime-6.0 || true
  - systemctl daemon-reload
  - systemctl enable banditlab-postdeploy.service
  - nohup /home/ubuntu/.lab/start-postdeploy-after-cloudinit.sh >> /var/log/banditlab-trigger.log 2>&1 &

final_message: |
  BanditLab cloud-init bootstrap complete after $UPTIME seconds.
  Tool deployment starts automatically once cloud-init finishes.
  Monitor: multipass exec banditlab -- tail -f /home/ubuntu/.lab/postdeploy.log
  Trigger log: multipass exec banditlab -- sudo tail -f /var/log/banditlab-trigger.log
  Manual start: multipass exec banditlab -- sudo systemctl start banditlab-postdeploy.service
