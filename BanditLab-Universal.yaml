#cloud-config
#Description: BanditLab universal cloud-init config
#Version: v2026.07.14.4
#Created: 2025-11-13
#Updated: 2026-07-14
#Target: Ubuntu 24.04 (noble) — Multipass on macOS (aarch64 / x86_64)
#Usage: multipass launch 24.04 --name banditlab --cpus 4 --memory 8G --disk 80G --cloud-init BanditLab-Universal.yaml
#Post-deploy: starts automatically after cloud-init completes; monitor: tail -f ~/.lab/postdeploy.log

